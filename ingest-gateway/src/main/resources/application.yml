server:
  port: 8084
  forward-headers-strategy: framework
  tomcat:
    relaxed-path-chars: '\'
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: ingest-gateway
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prg_dev}
    username: ${DB_USERNAME:prg_app}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: segment-writer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.prg.ingest.kafka.event"
        spring.json.value.default.type: "com.prg.ingest.kafka.event.SegmentConfirmedEvent"
    listener:
      type: batch
      ack-mode: manual
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

kafka:
  dual-write:
    enabled: ${KAFKA_DUAL_WRITE:false}
  confirm-mode: ${KAFKA_CONFIRM_MODE:sync}
  segment-writer:
    enabled: ${KAFKA_SEGMENT_WRITER:false}

prg:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    internal-api-key: ${INTERNAL_API_KEY}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    presign-endpoint: ${S3_PRESIGN_ENDPOINT:${S3_ENDPOINT:http://localhost:9000}}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:prg-segments}
    presign-expiry-sec: ${S3_PRESIGN_EXPIRY:300}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    url: ${SWAGGER_API_DOCS_URL:/v3/api-docs}
    config-url: ${SWAGGER_CONFIG_URL:/v3/api-docs/swagger-config}
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.prg.ingest: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [%X{correlation_id:-}] [%X{tenant_id:-}] - %msg%n"
