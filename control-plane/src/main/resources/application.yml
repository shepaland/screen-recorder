server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: control-plane

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prg_dev}
    username: ${DB_USERNAME:prg_app}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: webhook-dispatcher
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.prg.controlplane.kafka.event"
        spring.json.value.default.type: "com.prg.controlplane.kafka.event.WebhookOutboundEvent"
    listener:
      ack-mode: manual
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

kafka:
  dual-write:
    enabled: ${KAFKA_DUAL_WRITE:false}
  webhook-dispatcher:
    enabled: ${KAFKA_WEBHOOK_DISPATCHER:false}

prg:
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    internal-api-key: ${INTERNAL_API_KEY}
  ingest-service:
    base-url: ${INGEST_SERVICE_URL:http://localhost:8084}
  security:
    internal-api-key: ${INTERNAL_API_KEY}
  device:
    heartbeat-timeout-sec: ${HEARTBEAT_TIMEOUT:90}
    default-heartbeat-interval-sec: 30
    default-segment-duration-sec: 10
    default-capture-fps: 1
    default-quality: medium

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    url: ${SWAGGER_API_DOCS_URL:/v3/api-docs}
    config-url: ${SWAGGER_CONFIG_URL:/v3/api-docs/swagger-config}
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.prg.controlplane: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [%X{correlation_id:-}] [%X{tenant_id:-}] - %msg%n"
