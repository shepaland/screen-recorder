server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prg_dev}
    username: ${DB_USERNAME:prg_app}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:sm16.hosting.reg.ru}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:otp@shepaland.ru}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
        transport:
          protocol: smtp

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

app:
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

prg:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 900
    refresh-token-ttl: 2592000
    issuer: prg-auth-service
  security:
    internal-api-key: ${INTERNAL_API_KEY}
    bcrypt-strength: 12
    max-login-attempts: 5
    login-attempt-window: 900
  device:
    heartbeat-interval-sec: ${DEVICE_HEARTBEAT_INTERVAL:30}
    segment-duration-sec: ${DEVICE_SEGMENT_DURATION:10}
    capture-fps: ${DEVICE_CAPTURE_FPS:1}
    quality: ${DEVICE_QUALITY:medium}
    ingest-base-url: ${INGEST_BASE_URL:}
    control-plane-base-url: ${CONTROL_PLANE_BASE_URL:}
    default-resolution: ${DEVICE_DEFAULT_RESOLUTION:720p}
    default-session-max-hours: ${DEVICE_SESSION_MAX_HOURS:24}
    default-auto-start: ${DEVICE_AUTO_START:true}
  oauth:
    yandex:
      client-id: ${YANDEX_OAUTH_CLIENT_ID:}
      client-secret: ${YANDEX_OAUTH_CLIENT_SECRET:}
      authorize-url: https://oauth.yandex.ru/authorize
      token-url: https://oauth.yandex.ru/token
      user-info-url: https://login.yandex.ru/info?format=json
      callback-url: ${YANDEX_OAUTH_CALLBACK_URL:}
    mailru:
      client-id: ${MAILRU_OAUTH_CLIENT_ID:}
      client-secret: ${MAILRU_OAUTH_CLIENT_SECRET:}
      authorize-url: https://oauth.mail.ru/login
      token-url: https://oauth.mail.ru/token
      user-info-url: https://oauth.mail.ru/userinfo
      callback-url: ${MAILRU_OAUTH_CALLBACK_URL:}
      scope: userinfo
      enabled: ${MAILRU_OAUTH_ENABLED:false}
    intermediate-token-ttl: 600
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  email-otp:
    code-ttl: 600
    code-length: 6
    max-verify-attempts: 10
    block-duration: 1800
    send-cooldown: 60
    send-window-max: 5
    send-window-duration: 1800
    ip-burst-max: 20
    ip-burst-window: 300
    hmac-secret: ${OTP_HMAC_SECRET:dev-only-hmac-secret-not-for-production}
    max-tenants-per-email: 10
  email:
    from: ${EMAIL_FROM:otp@shepaland.ru}
    from-name: ${EMAIL_FROM_NAME:Кадеро}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:80}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    url: ${SWAGGER_API_DOCS_URL:/v3/api-docs}
    config-url: ${SWAGGER_CONFIG_URL:/v3/api-docs/swagger-config}
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

logging:
  level:
    com.prg.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [%X{correlation_id:-}] [%X{tenant_id:-}] [%X{user_id:-}] - %msg%n"
