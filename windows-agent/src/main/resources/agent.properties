# PRG Screen Recorder Agent Configuration

# Server URLs (overridden after login from server_config)
server.base.url=https://localhost
server.auth.url=${server.base.url}/api/v1/auth
server.control.url=${server.base.url}/api/v1/devices
server.ingest.url=${server.base.url}/api/v1/ingest

# Data directories
agent.data.dir=${user.home}/.prg-agent
agent.log.dir=${user.home}/.prg-agent/logs
agent.segments.dir=${user.home}/.prg-agent/segments

# Buffer limits
agent.max.buffer.mb=2048
agent.upload.threads=2
agent.upload.retry.max=3

# Capture settings (overridden from server)
agent.capture.fps=5
agent.capture.segment.duration.sec=10
agent.capture.quality=medium

# FFmpeg path (empty = use PATH)
agent.ffmpeg.path=
