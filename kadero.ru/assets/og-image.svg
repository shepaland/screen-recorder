<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: clean white -->
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Subtle red decorative element: top-right corner arc -->
  <circle cx="1200" cy="0" r="260" fill="#EF3124" opacity="0.06"/>
  <!-- Subtle red decorative element: bottom-left corner arc -->
  <circle cx="0" cy="630" r="180" fill="#EF3124" opacity="0.04"/>
  <!-- Red accent line -->
  <rect x="550" y="190" width="100" height="4" rx="2" fill="#EF3124"/>
  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="#1A1A1A" letter-spacing="-0.025em">Кадеро</text>
  <!-- Subtitle -->
  <text x="600" y="300" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#6B6B6B">Платформа записи экранов операторов контактного центра</text>
  <!-- Thin divider -->
  <rect x="480" y="335" width="240" height="1" fill="#E0E0E0"/>
  <!-- Stats row -->
  <text x="360" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#1A1A1A">10 000</text>
  <text x="360" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#6B6B6B">рабочих станций</text>
  <text x="600" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#1A1A1A">6</text>
  <text x="600" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#6B6B6B">микросервисов</text>
  <text x="840" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#1A1A1A">24/7</text>
  <text x="840" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#6B6B6B">непрерывная запись</text>
  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#EF3124">www.kadero.ru</text>
  <!-- Bottom red accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#EF3124"/>
</svg>
