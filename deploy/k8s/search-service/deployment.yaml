apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  labels:
    app: search-service
    app.kubernetes.io/part-of: screen-recorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      automountServiceAccountToken: false
      containers:
        - name: search-service
          image: prg-search-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: search-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: OPENSEARCH_HOST
              valueFrom:
                configMapKeyRef:
                  name: search-service-config
                  key: OPENSEARCH_HOST
            - name: OPENSEARCH_PORT
              valueFrom:
                configMapKeyRef:
                  name: search-service-config
                  key: OPENSEARCH_PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: search-service-config
                  key: AUTH_SERVICE_URL
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: search-service-config
                  key: JAVA_OPTS
          ports:
            - containerPort: 8083
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
