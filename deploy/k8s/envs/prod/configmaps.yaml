# Production environment configmaps
# Server: shepaland-videocalls-test-srv
# URL: https://services.shepaland.ru/screenrecorder
# Apply: kubectl -n prod-screen-record apply -f configmaps.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  labels:
    app: auth-service
data:
  DB_HOST: "172.17.0.1"
  DB_PORT: "5432"
  DB_NAME: "prg_prod"
  CORS_ORIGINS: "https://services.shepaland.ru"
  DEVICE_CAPTURE_FPS: "1"
  SMTP_HOST: "sm16.hosting.reg.ru"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@shepaland.ru"
  EMAIL_FROM_NAME: "Кадеро"
  FRONTEND_BASE_URL: "https://services.shepaland.ru/screenrecorder"
  JAVA_OPTS: "-Xms256m -Xmx512m"
  INGEST_BASE_URL: "https://services.shepaland.ru/screenrecorder/api/ingest/v1/ingest"
  CONTROL_PLANE_BASE_URL: "https://services.shepaland.ru/screenrecorder/api/cp/v1/devices"
  SWAGGER_API_DOCS_URL: "/screenrecorder/docs/auth/v3/api-docs"
  SWAGGER_CONFIG_URL: "/screenrecorder/docs/auth/v3/api-docs/swagger-config"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  labels:
    app: control-plane
data:
  DB_HOST: "172.17.0.1"
  DB_PORT: "5432"
  DB_NAME: "prg_prod"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  INGEST_SERVICE_URL: "http://ingest-gateway:8084"
  HEARTBEAT_TIMEOUT: "90"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_DUAL_WRITE: "false"
  KAFKA_CONFIRM_MODE: "sync"
  JAVA_OPTS: "-Xms256m -Xmx512m"
  SWAGGER_API_DOCS_URL: "/screenrecorder/docs/cp/v3/api-docs"
  SWAGGER_CONFIG_URL: "/screenrecorder/docs/cp/v3/api-docs/swagger-config"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingest-gateway-config
  labels:
    app: ingest-gateway
data:
  DB_HOST: "172.17.0.1"
  DB_PORT: "5432"
  DB_NAME: "prg_prod"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  S3_ENDPOINT: "http://minio:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET: "prg-segments"
  S3_PRESIGN_EXPIRY: "300"
  S3_PRESIGN_ENDPOINT: "https://services.shepaland.ru"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_DUAL_WRITE: "false"
  KAFKA_CONFIRM_MODE: "sync"
  JAVA_OPTS: "-Xms256m -Xmx768m"
  SWAGGER_API_DOCS_URL: "/screenrecorder/docs/ingest/v3/api-docs"
  SWAGGER_CONFIG_URL: "/screenrecorder/docs/ingest/v3/api-docs/swagger-config"
