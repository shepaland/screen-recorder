# Test ingress: services-test.shepaland.ru/screenrecorder
# Server: shepaland-cloud (cert-manager + ClusterIssuer letsencrypt-prod)
# Apply: kubectl -n test-screen-record apply -f ingress.yaml
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-screenrecorder
spec:
  stripPrefix:
    prefixes:
      - /screenrecorder
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-dashboard
  labels:
    app: web-dashboard
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "test-screen-record-strip-screenrecorder@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - services-test.shepaland.ru
      secretName: services-test-shepaland-ru-tls
  rules:
    - host: services-test.shepaland.ru
      http:
        paths:
          - path: /screenrecorder
            pathType: Prefix
            backend:
              service:
                name: web-dashboard
                port:
                  number: 80
---
# Ingress for presigned S3 upload URLs (agents upload segments via /prg-segments/)
# NO StripPrefix — path must be preserved for MinIO signature validation
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prg-segments-upload
  labels:
    app: web-dashboard
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - services-test.shepaland.ru
      secretName: services-test-shepaland-ru-tls
  rules:
    - host: services-test.shepaland.ru
      http:
        paths:
          - path: /prg-segments
            pathType: Prefix
            backend:
              service:
                name: web-dashboard
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-dashboard-redirect
  labels:
    app: web-dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "test-screen-record-redirect-https@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: services-test.shepaland.ru
      http:
        paths:
          - path: /screenrecorder
            pathType: Prefix
            backend:
              service:
                name: web-dashboard
                port:
                  number: 80
          - path: /prg-segments
            pathType: Prefix
            backend:
              service:
                name: web-dashboard
                port:
                  number: 80
